services:
  core:
    build:
      context: ./core-service
      dockerfile: Dockerfile
    container_name: core-service
    ports:
      - "${CORE_SERVER_PORT:-8080}:${CORE_SERVER_PORT:-8080}"
    environment:
      SERVER_PORT: ${CORE_SERVER_PORT:-8080}
      DB_URL: ${DB_URL}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      CLASSIFIER_URL: ${CLASSIFIER_URL}
      CLASSIFIER_CONFIDENCE_THRESHOLD: ${CLASSIFIER_CONFIDENCE_THRESHOLD:-0.9}
      COACH_SCHEDULER_CRON: ${COACH_SCHEDULER_CRON}
    networks:
      - finsense-net
    restart: unless-stopped
  
  classifier:
    build:
      context: ./classifier-service
      dockerfile: Dockerfile
    container_name: classifier-service
    ports:
      - "${CLASSIFIER_SERVER_PORT:-8081}:${CLASSIFIER_SERVER_PORT:-8081}"
    environment:
      SERVER_PORT: ${CLASSIFIER_SERVER_PORT:-8081}
    networks:
      - finsense-net
    restart: unless-stopped

  tester:
    profiles: ["tester"]
    build:
      context: ./tools/transaction-tester
      dockerfile: Dockerfile
    container_name: transaction-tester
    ports:
      - "${TESTER_SERVER_PORT:-8501}:8501"
    environment:
      TESTER_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      TESTER_CORE_BASE_URL: ${TESTER_CORE_BASE_URL}
      TESTER_TOPIC: ${TESTER_TOPIC:-raw-transactions}
    networks:
      - finsense-net
    restart: unless-stopped

  prompt-lab:
    profiles: ["prompt-lab"]
    build:
      context: ./tools/prompt-lab
      dockerfile: Dockerfile
    container_name: prompt-lab
    ports:
      - "${PROMPT_LAB_SERVER_PORT:-8502}:8502"
    environment:
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      LLM_API_BASE_URL: ${LLM_API_BASE_URL:-https://api.deepseek.com}
      LLM_MODEL: ${LLM_MODEL:-deepseek-chat}
    networks:
      - finsense-net
    restart: unless-stopped

  reasoning:
    build:
      context: ./transaction-classifier-agent
      dockerfile: Dockerfile
    container_name: reasoning-agent
    ports:
      - "${REASONING_SERVER_PORT:-8082}:${REASONING_SERVER_PORT:-8082}"
    environment:
      SERVER_PORT: ${REASONING_SERVER_PORT:-8082}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      SPRING_AI_OPENAI_API_KEY: ${DEEPSEEK_API_KEY}
      LLM_API_BASE_URL: ${LLM_API_BASE_URL:-https://api.deepseek.com}
      LLM_MODEL: ${LLM_MODEL:-deepseek-chat}
      LLM_LOGS_DIR: ${REASONING_LLM_LOGS_DIR:-/var/log/finsense/llm-classifier}
      LLM_TIMEOUT_SECONDS: ${REASONING_LLM_TIMEOUT_SECONDS:-60}
      LLM_RETRY_MAX_ATTEMPTS: ${REASONING_LLM_RETRY_MAX_ATTEMPTS:-3}
      LLM_RETRY_BACKOFF_DELAY_MS: ${REASONING_LLM_RETRY_BACKOFF_DELAY_MS:-1000}
    volumes:
      - ./logs/llm-classifier:/var/log/finsense/llm-classifier
    networks:
      - finsense-net
    restart: unless-stopped

  coach:
    build:
      context: ./financial-coach-agent
      dockerfile: Dockerfile
    container_name: coach-agent
    ports:
      - "${COACH_SERVER_PORT:-8083}:${COACH_SERVER_PORT:-8083}"
    environment:
      SERVER_PORT: ${COACH_SERVER_PORT:-8083}
      DB_URL: ${DB_URL}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      SPRING_AI_OPENAI_API_KEY: ${DEEPSEEK_API_KEY}
      LLM_API_BASE_URL: ${LLM_API_BASE_URL:-https://api.deepseek.com}
      LLM_MODEL: ${LLM_MODEL:-deepseek-chat}
      LLM_LOGS_DIR: ${LLM_LOGS_DIR:-/var/log/finsense/coach-llm}
      ANALYTICS_TOP_MERCHANTS_LIMIT: ${ANALYTICS_TOP_MERCHANTS_LIMIT:-5}
    volumes:
      - ./logs/coach-llm:/var/log/finsense/coach-llm
    networks:
      - finsense-net
    restart: unless-stopped

